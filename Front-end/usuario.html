<!-- ============================================ -->
<!-- ! DOCUMENTO HTML - TELA DE INFORMAÇÕES DO USUÁRIO -->
<!-- ============================================ -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- * Metadados essenciais -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil</title>
  
  <!-- * Link para folha de estilos CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ============================================ -->
  <!-- ! CABEÇALHO (HEADER) -->
  <!-- ============================================ -->
  <header class="header">
    <!-- * Logo com ícone e texto -->
    <div class="logo">
      <!-- * Ícone do logo (SVG de documento) -->
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <span class="logo-text">Ajuda.AI</span>
    </div>
    
    <!-- * Botão de sair -->
    <button class="btn-login" onclick="logout()">
      <!-- * Ícone de sair (SVG) -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      <span>Sair</span>
    </button>
  </header>

  <!-- ============================================ -->
  <!-- ! CONTEÚDO PRINCIPAL -->
  <!-- ============================================ -->
  <main class="main">
    <!-- ============================================ -->
    <!-- ! CONTAINER DE INFORMAÇÕES DO USUÁRIO -->
    <!-- ============================================ -->
    <div class="question-container">
      <div class="question-card">
        <!-- * Título principal da página -->
        <h1 class="page-title">Meu Perfil</h1>
        <!-- * Subtítulo explicativo -->
        <p class="page-subtitle">Complete suas informações para personalizarmos melhor sua experiência</p>
        
        <!-- * Formulário de informações do usuário -->
        <form id="userInfoForm" class="user-info-form">
          <!-- * Seção: Informações Pessoais -->
          <div class="form-section">
            <h3 class="section-title">Informações Pessoais</h3>
            
            <!-- * Campo de nome completo -->
            <div class="form-group">
              <label for="nome" class="form-label">Nome Completo</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
                <input 
                  type="text" 
                  id="nome" 
                  name="nome" 
                  class="form-input" 
                  placeholder="Seu nome completo"
                  required
                >
              </div>
            </div>

            <!-- * Campo de data de nascimento -->
            <div class="form-group">
              <label for="nascimento" class="form-label">Data de Nascimento</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                </div>
                <input 
                  type="date" 
                  id="nascimento" 
                  name="nascimento" 
                  class="form-input"
                  required
                >
              </div>
            </div>

            <!-- * Campo de gênero -->
            <div class="form-group">
              <label class="form-label">Gênero</label>
              <div class="radio-group">
                <label class="radio-option">
                  <input type="radio" name="genero" value="masculino" required>
                  <span class="radio-text">Masculino</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="genero" value="feminino" required>
                  <span class="radio-text">Feminino</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="genero" value="outro" required>
                  <span class="radio-text">Outro</span>
                </label>
              </div>
            </div>
          </div>

          <!-- * Seção: Contato -->
          <div class="form-section">
            <h3 class="section-title">Informações de Contato</h3>
            
            <!-- * Campo de email -->
            <div class="form-group">
              <label for="email" class="form-label">E-mail</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                  </svg>
                </div>
                <input 
                  type="email" 
                  id="email" 
                  name="email" 
                  class="form-input" 
                  placeholder="seu@email.com"
                  readonly
                >
              </div>
            </div>

            <!-- * Campo de telefone -->
            <div class="form-group">
              <label for="telefone" class="form-label">Telefone</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                  </svg>
                </div>
                <input 
                  type="tel" 
                  id="telefone" 
                  name="telefone" 
                  class="form-input" 
                  placeholder="(00) 00000-0000"
                  required
                >
              </div>
            </div>
          </div>

          <!-- * Seção: Localização -->
          <div class="form-section">
            <h3 class="section-title">Localização</h3>
            
            <!-- * Campo de CEP -->
            <div class="form-group">
              <label for="cep" class="form-label">CEP</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </div>
                <input 
                  type="text" 
                  id="cep" 
                  name="cep" 
                  class="form-input" 
                  placeholder="00000-000"
                  maxlength="9"
                  required
                >
              </div>
            </div>

            <!-- * Campo de endereço -->
            <div class="form-group">
              <label for="endereco" class="form-label">Endereço</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                  </svg>
                </div>
                <input 
                  type="text" 
                  id="endereco" 
                  name="endereco" 
                  class="form-input" 
                  placeholder="Rua, número, bairro"
                  required
                >
              </div>
            </div>

            <!-- * Campo de cidade -->
            <div class="form-group">
              <label for="cidade" class="form-label">Cidade</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                  </svg>
                </div>
                <input 
                  type="text" 
                  id="cidade" 
                  name="cidade" 
                  class="form-input" 
                  placeholder="Sua cidade"
                  required
                >
              </div>
            </div>

            <!-- * Campo de estado -->
            <div class="form-group">
              <label for="estado" class="form-label">Estado</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                  </svg>
                </div>
                <select id="estado" name="estado" class="form-input" required>
                  <option value="">Selecione um estado</option>
                  <option value="AC">Acre</option>
                  <option value="AL">Alagoas</option>
                  <option value="AP">Amapá</option>
                  <option value="AM">Amazonas</option>
                  <option value="BA">Bahia</option>
                  <option value="CE">Ceará</option>
                  <option value="DF">Distrito Federal</option>
                  <option value="ES">Espírito Santo</option>
                  <option value="GO">Goiás</option>
                  <option value="MA">Maranhão</option>
                  <option value="MT">Mato Grosso</option>
                  <option value="MS">Mato Grosso do Sul</option>
                  <option value="MG">Minas Gerais</option>
                  <option value="PA">Pará</option>
                  <option value="PB">Paraíba</option>
                  <option value="PR">Paraná</option>
                  <option value="PE">Pernambuco</option>
                  <option value="PI">Piauí</option>
                  <option value="RJ">Rio de Janeiro</option>
                  <option value="RN">Rio Grande do Norte</option>
                  <option value="RS">Rio Grande do Sul</option>
                  <option value="RO">Rondônia</option>
                  <option value="RR">Roraima</option>
                  <option value="SC">Santa Catarina</option>
                  <option value="SP">São Paulo</option>
                  <option value="SE">Sergipe</option>
                  <option value="TO">Tocantins</option>
                </select>
              </div>
            </div>
          </div>

          <!-- * Botões de ação -->
          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
              <span>Cancelar</span>
            </button>
            <button type="submit" class="btn-submit" id="saveBtn">
              <span>Salvar Informações</span>
              <!-- * Ícone de check -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- ============================================ -->
  <!-- ! ESTILOS ADICIONAIS PARA PERFIL -->
  <!-- ============================================ -->
  <style>
    /* Estilos específicos para a tela de perfil */
    .user-info-form {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .form-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.5rem;
      background-color: #f8fafc;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e2e8f0;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
    }

    .input-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      width: 20px;
      height: 20px;
      color: #9ca3af;
      z-index: 1;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 3rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s ease;
      background-color: white;
    }

    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .form-input[readonly] {
      background-color: #f3f4f6;
      cursor: not-allowed;
    }

    .radio-group {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      color: #4b5563;
    }

    .radio-option input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #3b82f6;
    }

    .radio-text {
      user-select: none;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      background-color: #f3f4f6;
      color: #6b7280;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      background-color: #e5e7eb;
      border-color: #9ca3af;
      color: #4b5563;
    }

    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
    }

    .btn-submit svg {
      width: 18px;
      height: 18px;
    }

    /* Responsividade */
    @media (max-width: 640px) {
      .form-section {
        padding: 1rem;
      }

      .radio-group {
        flex-direction: column;
        gap: 0.75rem;
      }

      .form-actions {
        flex-direction: column;
      }

      .btn-secondary,
      .btn-submit {
        width: 100%;
      }
    }
  </style>

  <!-- ============================================ -->
  <!-- ! SCRIPTS -->
  <!-- ============================================ -->
  <script>
    // Carrega os dados do usuário do localStorage
    document.addEventListener('DOMContentLoaded', function() {
      const userData = localStorage.getItem('userData');
      const userId = localStorage.getItem('userId');
      
      if (userData && userId) {
        const user = JSON.parse(userData);
        
        // Preenche o campo de email
        document.getElementById('email').value = user.email || '';
        
        // Preenche outros campos se existirem
        if (user.nome) document.getElementById('nome').value = user.nome;
        if (user.telefone) document.getElementById('telefone').value = user.telefone;
        if (user.data_nascimento) document.getElementById('nascimento').value = user.data_nascimento;
        if (user.genero) {
          const generoRadio = document.querySelector(`input[name="genero"][value="${user.genero}"]`);
          if (generoRadio) generoRadio.checked = true;
        }
        if (user.cep) document.getElementById('cep').value = user.cep;
        if (user.endereco) document.getElementById('endereco').value = user.endereco;
        if (user.cidade) document.getElementById('cidade').value = user.cidade;
        if (user.estado) document.getElementById('estado').value = user.estado;
      } else {
        // Se não houver dados, redireciona para o login
        window.location.href = 'login.html';
      }

      // Máscara para CEP
      document.getElementById('cep').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 5) {
          value = value.slice(0, 5) + '-' + value.slice(5, 8);
        }
        e.target.value = value;
      });

      // Máscara para telefone
      document.getElementById('telefone').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 10) {
          value = value.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
        } else {
          value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
        }
        e.target.value = value;
      });
    });

    // Função de logout
    function logout() {
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userData');
      localStorage.removeItem('userId');
      window.location.href = 'login.html';
    }

    // Submete o formulário
    document.getElementById('userInfoForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const userId = localStorage.getItem('userId');
      if (!userId) {
        window.location.href = 'login.html';
        return;
      }
      
      // Coleta os dados do formulário
      const formData = new FormData(e.target);
      const userData = {};
      
      for (let [key, value] of formData.entries()) {
        userData[key] = value;
      }
      
      try {
        // Desabilita o botão durante a requisição
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span>Salvando...</span>';
        
        // Faz requisição para o backend
        const response = await fetch(`http://localhost:3000/api/usuarios/${userId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(userData),
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Atualiza dados no localStorage
          localStorage.setItem('userData', JSON.stringify(userData));
          
          // Mostra mensagem de sucesso
          alert('Informações salvas com sucesso!');
          
          // Redireciona para o questionário
          window.location.href = 'index.html';
        } else {
          // Mostra erro
          alert(data.erro || 'Erro ao salvar informações');
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro de conexão com o servidor. Tente novamente.');
      } finally {
        // Reabilita o botão
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = false;
        saveBtn.innerHTML = `
          <span>Salvar Informações</span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        `;
      }
    });
  </script>
</body>
</html>
