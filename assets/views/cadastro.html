<!-- ============================================ -->
<!-- ! DOCUMENTO HTML - TELA DE CADASTRO -->
<!-- ============================================ -->
<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- * Metadados essenciais -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>

    <!-- * Link para folha de estilos CSS -->
    <link rel="stylesheet" href="/assets/styles/style.css" />
  </head>
  <body>
    <!-- ============================================ -->
    <!-- ! CABEÇALHO (HEADER) -->
    <!-- ============================================ -->
    <header class="header">
      <!-- * Logo com ícone e texto -->
      <div class="logo">
        <!-- * Ícone do logo (SVG de documento) -->
        <div class="logo-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
        </div>
        <span class="logo-text">Ajuda.AI</span>
      </div>

      <!-- * Botão de voltar para login -->
      <button
        class="btn-login"
        onclick="window.location.href = '/assets/views/login.html'"
      >
        <!-- * Ícone de voltar (SVG) -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10 19l-7-7m0 0l7-7m-7 7h18"
          />
        </svg>
        <span>Voltar</span>
      </button>
    </header>

    <!-- ============================================ -->
    <!-- ! CONTEÚDO PRINCIPAL -->
    <!-- ============================================ -->
    <main class="main">
      <!-- ============================================ -->
      <!-- ! CONTAINER DE CADASTRO -->
      <!-- ============================================ -->
      <div class="question-container">
        <div class="question-card">
          <!-- * Título principal da página -->
          <h1 class="page-title">Criar Conta</h1>
          <!-- * Subtítulo explicativo -->
          <p class="page-subtitle">
            Preencha os dados abaixo para criar sua conta
          </p>

          <!-- * Formulário de cadastro -->
          <form id="cadastroForm" class="cadastro-form">
            <!-- * Campo de nome completo -->
            <div class="form-group">
              <label for="nome" class="form-label">Nome Completo</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                    />
                  </svg>
                </div>
                <input
                  type="text"
                  id="nome"
                  name="nome"
                  class="form-input"
                  placeholder="Seu nome completo"
                  required
                  oninput="validateCadastroForm()"
                />
              </div>
            </div>

            <!-- * Campo de email -->
            <div class="form-group">
              <label for="email" class="form-label">E-mail</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                    />
                  </svg>
                </div>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder="seu@email.com"
                  required
                  oninput="validateCadastroForm()"
                />
              </div>
            </div>

            <!-- * Campo de senha -->
            <div class="form-group">
              <label for="senha" class="form-label">Senha</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 15v2m-6 4h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                    />
                  </svg>
                </div>
                <input
                  type="password"
                  id="senha"
                  name="senha"
                  class="form-input"
                  placeholder="Mínimo 6 caracteres"
                  required
                  oninput="validateCadastroForm()"
                />
                <!-- * Botão para mostrar/ocultar senha -->
                <button
                  type="button"
                  class="password-toggle"
                  onclick="togglePassword('senha', this)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    class="eye-icon"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    class="eye-off-icon"
                    style="display: none"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- * Campo de confirmar senha -->
            <div class="form-group">
              <label for="confirmarSenha" class="form-label"
                >Confirmar Senha</label
              >
              <div class="input-container">
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.59 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                    />
                  </svg>
                </div>
                <input
                  type="password"
                  id="confirmarSenha"
                  name="confirmarSenha"
                  class="form-input"
                  placeholder="Digite a senha novamente"
                  required
                  oninput="validateCadastroForm()"
                />
                <!-- * Botão para mostrar/ocultar senha -->
                <button
                  type="button"
                  class="password-toggle"
                  onclick="togglePassword('confirmarSenha', this)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    class="eye-icon"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    class="eye-off-icon"
                    style="display: none"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- * Campo de telefone -->
            <div class="form-group">
              <label for="telefone" class="form-label">Telefone</label>
              <div class="input-container">
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                    />
                  </svg>
                </div>
                <input
                  type="tel"
                  id="telefone"
                  name="telefone"
                  class="form-input"
                  placeholder="(00) 00000-0000"
                  oninput="validateCadastroForm()"
                />
              </div>
            </div>

            <!-- * Campo de data de nascimento -->
            <div class="form-group">
              <label for="nascimento" class="form-label"
                >Data de Nascimento</label
              >
              <div class="input-container">
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                </div>
                <input
                  type="date"
                  id="nascimento"
                  name="nascimento"
                  class="form-input"
                  oninput="validateCadastroForm()"
                />
              </div>
            </div>

            <!-- * Campo de gênero -->
            <div class="form-group">
              <label class="form-label">Gênero</label>
              <div class="radio-group">
                <label class="radio-option">
                  <input
                    type="radio"
                    name="genero"
                    value="masculino"
                    required
                  />
                  <span class="radio-text">Masculino</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="genero" value="feminino" required />
                  <span class="radio-text">Feminino</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="genero" value="outro" required />
                  <span class="radio-text">Outro</span>
                </label>
              </div>
            </div>

            <!-- * Checkbox de termos -->
            <div class="form-options">
              <label class="checkbox-container">
                <input
                  type="checkbox"
                  id="termos"
                  name="termos"
                  required
                  onchange="validateCadastroForm()"
                />
                <span class="checkmark"></span>
                <span class="checkbox-text"
                  >Aceito os termos de uso e política de privacidade</span
                >
              </label>
            </div>

            <!-- * Botões de ação -->
            <div class="form-actions">
              <button
                type="button"
                class="btn-secondary"
                onclick="window.location.href = '/assets/views/login.html'"
              >
                <span>Cancelar</span>
              </button>
              <button
                type="submit"
                class="btn-submit"
                id="cadastroBtn"
                disabled
              >
                <span>Criar Conta</span>
                <!-- * Ícone de usuário -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
                  />
                </svg>
              </button>
            </div>
          </form>

          <!-- * Link para login -->
          <div class="signup-link">
            <p>
              Já tem uma conta?
              <a href="/assets/views/login.html">Faça login aqui</a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- ============================================ -->
    <!-- ! ESTILOS ADICIONAIS PARA CADASTRO -->
    <!-- ============================================ -->
    <style>
      /* Estilos específicos para a tela de cadastro */
      .cadastro-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .form-label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #374151;
      }

      .input-container {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-icon {
        position: absolute;
        left: 1rem;
        width: 20px;
        height: 20px;
        color: #9ca3af;
        z-index: 1;
      }

      .form-input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 3rem;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.2s ease;
        background-color: white;
      }

      .form-input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-input::placeholder {
        color: #9ca3af;
      }

      /* Estilos para o botão de mostrar/ocultar senha */
      .password-toggle {
        position: absolute;
        right: 1rem;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.5rem;
        color: #9ca3af;
        transition: color 0.2s ease;
        z-index: 1;
      }

      .password-toggle:hover {
        color: #3b82f6;
      }

      .password-toggle svg {
        width: 20px;
        height: 20px;
      }

      /* Ajuste do padding do input quando há botão de toggle */
      .input-container:has(.password-toggle) .form-input {
        padding-right: 3.5rem;
      }

      .form-options {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0.5rem 0;
      }

      .checkbox-container {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.875rem;
        color: #6b7280;
      }

      .checkbox-container input[type="checkbox"] {
        display: none;
      }

      .checkmark {
        width: 18px;
        height: 18px;
        border: 2px solid #d1d5db;
        border-radius: 4px;
        position: relative;
        transition: all 0.2s ease;
      }

      .checkbox-container input[type="checkbox"]:checked + .checkmark {
        background-color: #3b82f6;
        border-color: #3b82f6;
      }

      .checkbox-container input[type="checkbox"]:checked + .checkmark::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 2px;
        width: 5px;
        height: 8px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .radio-group {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.875rem;
        color: #4b5563;
      }

      .radio-option input[type="radio"] {
        width: 18px;
        height: 18px;
        accent-color: #3b82f6;
      }

      .radio-text {
        user-select: none;
      }

      .form-actions {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
        margin-top: 1rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e7eb;
      }

      .btn-secondary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.875rem 1.5rem;
        background-color: #f3f4f6;
        color: #6b7280;
        border: 2px solid #d1d5db;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-secondary:hover {
        background-color: #e5e7eb;
        border-color: #9ca3af;
        color: #4b5563;
      }

      .btn-submit {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.875rem 1.5rem;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
      }

      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-submit svg {
        width: 18px;
        height: 18px;
      }

      .signup-link {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e7eb;
      }

      .signup-link p {
        color: #6b7280;
        font-size: 0.875rem;
      }

      .signup-link a {
        color: #3b82f6;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }

      .signup-link a:hover {
        color: #2563eb;
        text-decoration: underline;
      }

      /* Responsividade */
      @media (max-width: 640px) {
        .radio-group {
          flex-direction: column;
          gap: 0.75rem;
        }

        .form-actions {
          flex-direction: column;
        }

        .btn-secondary,
        .btn-submit {
          width: 100%;
        }
      }
    </style>

    <!-- ============================================ -->
    <!-- ! SCRIPTS -->
    <!-- ============================================ -->
    <script src="/assets/script/cadastro.js"></script>
  </body>
</html>
