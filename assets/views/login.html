<!-- ============================================ -->
<!-- ! DOCUMENTO HTML - TELA DE LOGIN -->
<!-- ============================================ -->
<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- * Metadados essenciais -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- * Link para folha de estilos CSS -->
    <link rel="stylesheet" href="/assets/styles/style.css" />
  </head>
  <body>
    <!-- ============================================ -->
    <!-- ! CABEÇALHO (HEADER) -->
    <!-- ============================================ -->
    <header class="header">
      <!-- * Logo com ícone e texto -->
      <div class="logo">
        <!-- * Ícone do logo (SVG de documento) -->
        <div class="logo-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
        </div>
        <span class="logo-text">Ajuda.AI</span>
      </div>

      <!-- * Botão de cadastro -->
      <button class="btn-login" onclick="window.location.href = 'index.html'">
        <!-- * Ícone de usuário (SVG) -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
          />
        </svg>
        <span>Cadastrar</span>
      </button>
    </header>

    <!-- ============================================ -->
    <!-- ! CONTEÚDO PRINCIPAL -->
    <!-- ============================================ -->
    <main class="main">
      <!-- ============================================ -->
      <!-- ! CONTAINER DE LOGIN -->
      <!-- ============================================ -->
      <div class="question-container">
        <div class="question-card">
          <!-- * Título principal da página -->
          <h1 class="page-title">Bem-vindo de volta!</h1>
          <!-- * Subtítulo explicativo -->
          <p class="page-subtitle">
            Faça login para acessar sua conta personalizada
          </p>

          <!-- * Formulário de login -->
          <form id="loginForm" class="login-form">
            <!-- * Campo de email -->
            <div class="form-group">
              <label for="email" class="form-label">E-mail</label>
              <div class="input-container">
                <!-- * Ícone de email -->
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                    />
                  </svg>
                </div>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder="seu@email.com"
                  required
                  oninput="validateForm()"
                />
              </div>
            </div>

            <!-- * Campo de senha -->
            <div class="form-group">
              <label for="senha" class="form-label">Senha</label>
              <div class="input-container">
                <!-- * Ícone de cadeado -->
                <div class="input-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 15v2m-6 4h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                    />
                  </svg>
                </div>
                <input
                  type="password"
                  id="senha"
                  name="senha"
                  class="form-input"
                  placeholder="••••••••"
                  required
                  oninput="validateForm()"
                />
                <!-- * Botão para mostrar/ocultar senha -->
                <button
                  type="button"
                  class="password-toggle"
                  onclick="togglePassword('senha', this)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    class="eye-icon"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    class="eye-off-icon"
                    style="display: none"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- * Checkbox de lembrar-me e link esqueci senha -->
            <div class="form-options">
              <label class="checkbox-container">
                <input type="checkbox" id="lembrar" name="lembrar" />
                <span class="checkmark"></span>
                <span class="checkbox-text">Lembrar-me</span>
              </label>
              <a href="#" class="forgot-password">Esqueci minha senha</a>
            </div>

            <!-- * Botão de entrar -->
            <button type="submit" class="btn-submit" id="loginBtn" disabled>
              <span>Entrar</span>
              <!-- * Ícone de seta para direita -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M13 7l5 5m0 0l-5 5m5-5H6"
                />
              </svg>
            </button>
          </form>

          <!-- * Link para cadastro -->
          <div class="signup-link">
            <p>
              Ainda não tem uma conta?
              <a href="cadastro.html">Cadastre-se aqui</a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- ============================================ -->
    <!-- ! ESTILOS ADICIONAIS PARA LOGIN -->
    <!-- ============================================ -->
    <style>
      /* Estilos específicos para a tela de login */
      .login-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .form-label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #374151;
      }

      .input-container {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-icon {
        position: absolute;
        left: 1rem;
        width: 20px;
        height: 20px;
        color: #9ca3af;
        z-index: 1;
      }

      .form-input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 3rem;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.2s ease;
        background-color: #f9fafb;
      }

      .form-input:focus {
        outline: none;
        border-color: #3b82f6;
        background-color: white;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-input::placeholder {
        color: #9ca3af;
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: -0.5rem 0;
      }

      .checkbox-container {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.875rem;
        color: #6b7280;
      }

      .checkbox-container input[type="checkbox"] {
        display: none;
      }

      .checkmark {
        width: 18px;
        height: 18px;
        border: 2px solid #d1d5db;
        border-radius: 4px;
        position: relative;
        transition: all 0.2s ease;
      }

      .checkbox-container input[type="checkbox"]:checked + .checkmark {
        background-color: #3b82f6;
        border-color: #3b82f6;
      }

      .checkbox-container input[type="checkbox"]:checked + .checkmark::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 2px;
        width: 5px;
        height: 8px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .forgot-password {
        color: #3b82f6;
        text-decoration: none;
        font-size: 0.875rem;
        transition: color 0.2s ease;
      }

      .forgot-password:hover {
        color: #2563eb;
        text-decoration: underline;
      }

      .signup-link {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e7eb;
      }

      .signup-link p {
        color: #6b7280;
        font-size: 0.875rem;
      }

      .signup-link a {
        color: #3b82f6;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }

      .signup-link a:hover {
        color: #2563eb;
        text-decoration: underline;
      }

      /* Estilos para o botão de mostrar/ocultar senha */
      .password-toggle {
        position: absolute;
        right: 1rem;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.5rem;
        color: #9ca3af;
        transition: color 0.2s ease;
        z-index: 1;
      }

      .password-toggle:hover {
        color: #3b82f6;
      }

      .password-toggle svg {
        width: 20px;
        height: 20px;
      }

      /* Ajuste do padding do input quando há botão de toggle */
      .input-container:has(.password-toggle) .form-input {
        padding-right: 3.5rem;
      }
    </style>

    <!-- ============================================ -->
    <!-- ! SCRIPTS -->
    <!-- ============================================ -->
    <script src="/assets/script/login.js"></script>
  </body>
</html>
